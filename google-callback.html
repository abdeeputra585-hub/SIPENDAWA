<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Google Login...</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            color: white; text-align: center;
        }
        .box { padding: 2rem; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { font-size: 0.9rem; opacity: 0.85; margin: 0; }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <p>Memproses login Google...</p>
    </div>

    <script>
        (function () {
            // Ambil fragment (#) dari URL — Google mengirim token di hash
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);

            const idToken = params.get('id_token');
            const error   = params.get('error');

            if (idToken) {
                // Kirim token ke halaman induk (opener)
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(
                        { type: 'GOOGLE_AUTH_SUCCESS', id_token: idToken },
                        window.location.origin
                    );
                }
            } else if (error) {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(
                        { type: 'GOOGLE_AUTH_ERROR', message: 'Google menolak login: ' + error },
                        window.location.origin
                    );
                }
            } else {
                // Tidak ada token maupun error — kemungkinan popup baru dibuka
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(
                        { type: 'GOOGLE_AUTH_ERROR', message: 'Login dibatalkan.' },
                        window.location.origin
                    );
                }
            }

            // Tutup popup setelah 1 detik
            setTimeout(() => window.close(), 1000);
        })();
    </script>
</body>
</html>
