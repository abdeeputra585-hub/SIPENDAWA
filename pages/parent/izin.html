<!-- /pages/parent/izin.html -->
<div class=" space-y-6 animate-fade-in relative pb-20 max-w-5xl mx-auto">
    
    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <div class="text-3xs text-slate-400 font-bold uppercase tracking-wider mb-0.5">Parent Portal &rarr; Administrasi</div>
            <h2 class="text-2xl font-bold text-slate-900">Pengajuan Izin Siswa</h2>
        </div>
        <button onclick="parentIzinOpenAddModal()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-sm flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Buat Pengajuan Baru
        </button>
    </div>

    <!-- TABLE DATA -->
    <div class="bg-white border border-slate-200 rounded-2xl shadow-2xs overflow-hidden mt-6">
        <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h4 class="font-bold text-slate-800 text-sm">Riwayat Pengajuan</h4>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-white text-slate-500 font-bold text-xs uppercase tracking-wider">
                    <tr>
                        <th class="px-6 py-4 border-b border-slate-200">Nama Anak</th>
                        <th class="px-6 py-4 border-b border-slate-200">Tipe Izin</th>
                        <th class="px-6 py-4 border-b border-slate-200">Tanggal Izin</th>
                        <th class="px-6 py-4 border-b border-slate-200">Tanggal Diajukan</th>
                        <th class="px-6 py-4 border-b border-slate-200 text-center">Status</th>
                        <th class="px-6 py-4 border-b border-slate-200 text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="parent-izin-tbody" class="divide-y divide-slate-100">
                    <tr><td colspan="6" class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner animate-spin text-2xl text-blue-500 mb-2"></i><br>Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <!-- PAGINATION -->
        <div class="p-4 border-t border-slate-100 flex items-center justify-between bg-white">
            <div id="parent-izin-page-info" class="text-xs text-slate-500 font-medium">Menampilkan 0 data</div>
            <div id="parent-izin-pagination" class="flex gap-1"></div>
        </div>
    </div>

    <!-- MODAL FORM PENGAJUAN -->
    <div id="modal-parent-izin-form" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-300">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in slide-in-from-bottom-4">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="font-bold text-xl text-slate-800">Form Pengajuan Izin/Sakit</h3>
                <button type="button" onclick="parentIzinCloseModal()" class="text-slate-400 hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar bg-white">
                <form id="parent-izin-form" onsubmit="parentIzinSave(event)" class="space-y-5">
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Pilih Anak <span class="text-red-500">*</span></label>
                        <select id="izin_id_siswa" name="id_siswa" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 cursor-pointer appearance-none">
                            <option value="">Pilih Siswa</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Tipe Izin <span class="text-red-500">*</span></label>
                            <select id="izin_tipe" name="tipe_izin" required onchange="parentIzinCheckTipe()" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 cursor-pointer appearance-none">
                                <option value="Sakit">Sakit</option>
                                <option value="Izin">Izin Keperluan Keluarga</option>
                                <option value="Dispensasi">Dispensasi Sekolah</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Tanggal Mulai <span class="text-red-500">*</span></label>
                            <input type="date" id="izin_mulai" name="tgl_mulai" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all text-slate-600">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Tanggal Selesai <span class="text-red-500">*</span></label>
                            <input type="date" id="izin_selesai" name="tgl_selesai" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all text-slate-600">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Alasan Lengkap <span class="text-red-500">*</span></label>
                        <textarea id="izin_alasan" name="alasan" required rows="3" placeholder="Tuliskan keterangan detail..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all resize-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Bukti File <span id="izin_label_wajib" class="text-red-500">* (Wajib)</span></label>
                        <p class="text-xs text-slate-500 mb-2">Upload surat dokter atau dokumen relevan (Maks 5MB: JPG, PNG, PDF)</p>
                        <input type="file" id="izin_file" name="bukti_file" accept="image/png, image/jpeg, application/pdf" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    </div>

                    <div class="flex justify-end gap-3 pt-6 border-t border-slate-100">
                        <button type="button" onclick="parentIzinCloseModal()" class="px-5 py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition">Batal</button>
                        <button type="submit" id="parent-izin-btn-save" class="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i> Kirim Pengajuan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL DETAIL -->
    <div id="modal-parent-izin-detail" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-300" onclick="if(event.target===this) parentIzinCloseDetail()">
        <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg text-slate-800">Detail Pengajuan</h3>
                <button type="button" onclick="parentIzinCloseDetail()" class="text-slate-400 hover:text-slate-600 w-8 h-8 flex items-center justify-center rounded-full bg-white shadow-sm">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar space-y-5 bg-white" id="parent-izin-detail-content">
                <!-- content -->
            </div>
        </div>
    </div>

</div>
