<!-- pages/guru/jadwal.html -->
<div class=" space-y-6 animate-fade-in">
    <div>
        <div class="text-3xs text-slate-400 font-bold uppercase tracking-wider mb-0.5">Teacher Panel &rarr; Jadwal</div>
        <h2 class="text-xl font-bold text-slate-900">Jadwal & Info Mengajar Saya</h2>
        <p class="text-sm text-slate-500 mt-1">Daftar mata pelajaran dan kelas yang Anda ampu saat ini.</p>
    </div>

    <div id="guru-jadwal-loading" class="flex items-center justify-center py-20 text-slate-400 text-sm">
        <i class="fa-solid fa-spinner animate-spin text-2xl text-blue-500 mr-3"></i> Memuat data jadwal...
    </div>

    <div id="guru-jadwal-content" class="hidden space-y-6">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-book"></i></div>
                <div>
                    <p class="text-xs text-slate-500 font-bold uppercase">Mata Pelajaran</p>
                    <p id="jadwal-total-mapel" class="text-2xl font-black text-slate-800">0</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-users-rectangle"></i></div>
                <div>
                    <p class="text-xs text-slate-500 font-bold uppercase">Kelas Diampu</p>
                    <p id="jadwal-total-kelas" class="text-2xl font-black text-slate-800">0</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-id-card"></i></div>
                <div>
                    <p class="text-xs text-slate-500 font-bold uppercase">Status</p>
                    <p id="jadwal-status" class="text-lg font-black text-emerald-600">Aktif</p>
                </div>
            </div>
        </div>

        <!-- Mata Pelajaran Grid -->
        <div>
            <h3 class="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2"><i class="fa-solid fa-book text-blue-500"></i> Mata Pelajaran yang Diampu</h3>
            <div id="jadwal-mapel-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Kelas Grid -->
        <div>
            <h3 class="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2"><i class="fa-solid fa-school text-emerald-500"></i> Kelas yang Diampu</h3>
            <div id="jadwal-kelas-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>
</div>
