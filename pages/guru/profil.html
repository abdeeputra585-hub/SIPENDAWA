<!-- /pages/guru/profil.html -->
<div class=" space-y-6 animate-fade-in relative pb-20">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <div class="text-3xs text-slate-400 font-bold uppercase tracking-wider mb-0.5">Teacher Panel &rarr; Akun</div>
            <h2 class="text-2xl font-bold text-slate-900">Profil Saya</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">

        <!-- KARTU PROFIL KIRI -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-2xs p-6 flex flex-col items-center gap-4">
            <!-- Avatar -->
            <div class="relative group">
                <img id="guru-profil-foto" src="https://ui-avatars.com/api/?name=Guru&size=120"
                    class="w-28 h-28 rounded-2xl object-cover border-2 border-slate-200 shadow-sm">
                <div class="absolute inset-0 flex items-center justify-center rounded-2xl bg-black/40 opacity-0 group-hover:opacity-100 transition cursor-pointer"
                    onclick="document.getElementById('guru-profil-foto-input').click()">
                    <i class="fa-solid fa-camera text-white text-xl"></i>
                </div>
            </div>
            <input type="file" id="guru-profil-foto-input" accept="image/*" class="hidden" onchange="guruProfilUploadFoto(this)">

            <div class="text-center">
                <h3 id="guru-profil-nama-display" class="font-bold text-slate-900 text-lg">Memuat...</h3>
                <p id="guru-profil-email-display" class="text-sm text-slate-400 mt-0.5">-</p>
                <p id="guru-profil-nip-display" class="text-xs text-slate-500 mt-0.5">NIP: -</p>
            </div>

            <!-- Tags mapel & kelas -->
            <div class="w-full space-y-3">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Mata Pelajaran</p>
                    <div id="guru-profil-mapel-tags" class="flex flex-wrap gap-1.5">
                        <span class="px-2 py-0.5 bg-blue-50 text-blue-700 text-xs font-bold rounded-lg border border-blue-100">Memuat...</span>
                    </div>
                </div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Kelas Ampuan</p>
                    <div id="guru-profil-kelas-tags" class="flex flex-wrap gap-1.5">
                        <span class="px-2 py-0.5 bg-amber-50 text-amber-700 text-xs font-bold rounded-lg border border-amber-100">Memuat...</span>
                    </div>
                </div>
            </div>

            <div id="guru-profil-status-badge" class="w-full text-center">
                <span class="px-3 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full">Aktif</span>
            </div>
        </div>

        <!-- FORM EDIT KANAN -->
        <div class="lg:col-span-2 space-y-4">

            <!-- Edit Data Diri -->
            <div class="bg-white border border-slate-200 rounded-2xl shadow-2xs overflow-hidden">
                <div class="p-5 border-b border-slate-100 bg-slate-50 flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-sm">
                        <i class="fa-solid fa-user-pen"></i>
                    </div>
                    <h4 class="font-bold text-slate-800">Edit Data Diri</h4>
                </div>
                <div class="p-6">
                    <form id="guru-profil-form" onsubmit="guruProfilSave(event)" class="space-y-4">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1">Nama Lengkap <span class="text-red-500">*</span></label>
                                <input type="text" id="guru-profil-nama" required
                                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1">NIP</label>
                                <input type="text" id="guru-profil-nip" disabled
                                    class="w-full px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-sm text-slate-400 cursor-not-allowed">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1">Email</label>
                                <input type="email" id="guru-profil-email" disabled
                                    class="w-full px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-sm text-slate-400 cursor-not-allowed">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1">No. Telepon / WA</label>
                                <input type="tel" id="guru-profil-telepon"
                                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Alamat</label>
                            <textarea id="guru-profil-alamat" rows="2"
                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all resize-none"></textarea>
                        </div>

                        <div class="flex justify-end pt-2">
                            <button type="submit" id="guru-profil-btn-save"
                                class="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition flex items-center gap-2">
                                <i class="fa-solid fa-save"></i> Simpan Perubahan
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Ganti Password -->
            <div class="bg-white border border-slate-200 rounded-2xl shadow-2xs overflow-hidden">
                <div class="p-5 border-b border-slate-100 bg-slate-50 flex items-center gap-3">
                    <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center text-sm">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h4 class="font-bold text-slate-800">Ganti Password</h4>
                </div>
                <div class="p-6">
                    <form id="guru-profil-pwd-form" onsubmit="guruProfilGantiPwd(event)" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1">Password Lama <span class="text-red-500">*</span></label>
                                <input type="password" id="guru-pwd-old" required
                                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1">Password Baru <span class="text-red-500">*</span></label>
                                <input type="password" id="guru-pwd-new" required minlength="6"
                                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1">Konfirmasi <span class="text-red-500">*</span></label>
                                <input type="password" id="guru-pwd-confirm" required minlength="6"
                                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all">
                            </div>
                        </div>
                        <div class="flex justify-end pt-2">
                            <button type="submit" id="guru-pwd-btn"
                                class="px-6 py-2.5 bg-amber-500 text-white font-bold rounded-xl shadow-md hover:bg-amber-600 transition flex items-center gap-2">
                                <i class="fa-solid fa-key"></i> Perbarui Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
