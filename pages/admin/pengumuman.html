<!-- /pages/admin/pengumuman.html -->
<div class=" space-y-6 animate-fade-in relative pb-20">
    
    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <div class="text-3xs text-slate-400 font-bold uppercase tracking-wider mb-0.5">Admin Panel &rarr; Komunikasi</div>
            <h2 class="text-2xl font-bold text-slate-900">Manajemen Pengumuman</h2>
        </div>
        <button onclick="adminPengumumanOpenAddModal()" class="admin-only px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition shadow-sm flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Buat Pengumuman Baru
        </button>
    </div>

    <!-- FILTERS -->
    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-2xs flex flex-col md:flex-row gap-4">
        <div class="flex-1">
            <select id="admin-pengumuman-kategori" onchange="adminPengumumanLoadList(1)" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 cursor-pointer appearance-none">
                <option value="all">Semua Kategori</option>
                <option value="Akademik">Akademik</option>
                <option value="Event">Event</option>
                <option value="Info Penting">Info Penting</option>
                <option value="Keuangan">Keuangan</option>
                <option value="Lainnya">Lainnya</option>
            </select>
        </div>
        <div class="flex-1">
            <select id="admin-pengumuman-status" onchange="adminPengumumanLoadList(1)" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 cursor-pointer appearance-none">
                <option value="all">Semua Status</option>
                <option value="Published">Published</option>
                <option value="Draft">Draft</option>
                <option value="Archived">Archived</option>
            </select>
        </div>
    </div>

    <!-- TABLE DATA -->
    <div class="bg-white border border-slate-200 rounded-2xl shadow-2xs overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-slate-50 text-slate-500 font-bold text-xs uppercase tracking-wider">
                    <tr>
                        <th class="px-6 py-4 border-b border-slate-200">Judul & Kategori</th>
                        <th class="px-6 py-4 border-b border-slate-200">Penulis</th>
                        <th class="px-6 py-4 border-b border-slate-200 text-center">Status</th>
                        <th class="px-6 py-4 border-b border-slate-200 text-center"><i class="fa-solid fa-eye"></i> Dibaca</th>
                        <th class="px-6 py-4 border-b border-slate-200">Tanggal</th>
                        <th class="px-6 py-4 border-b border-slate-200 text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="admin-pengumuman-tbody" class="divide-y divide-slate-100">
                    <tr><td colspan="6" class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner animate-spin text-2xl text-blue-500 mb-2"></i><br>Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <!-- PAGINATION -->
        <div class="p-4 border-t border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div id="admin-pengumuman-page-info" class="text-xs text-slate-500 font-medium">Menampilkan 0 data</div>
            <div id="admin-pengumuman-pagination" class="flex gap-1"></div>
        </div>
    </div>

    <!-- MODAL FORM PENGUMUMAN -->
    <div id="modal-admin-pengumuman-form" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 transition-opacity duration-300">
        <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 id="admin-pengumuman-modal-title" class="font-bold text-xl text-slate-800">Buat Pengumuman Baru</h3>
                <button type="button" onclick="adminPengumumanCloseModal()" class="text-slate-400 hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <form id="admin-pengumuman-form" onsubmit="adminPengumumanSave(event)" class="space-y-6">
                    <input type="hidden" id="pengumuman_id" name="id" value="0">
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Judul Pengumuman <span class="text-red-500">*</span></label>
                        <input type="text" id="pengumuman_judul" name="judul" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Kategori <span class="text-red-500">*</span></label>
                            <select id="pengumuman_kategori" name="kategori" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all appearance-none cursor-pointer">
                                <option value="Info Penting">Info Penting</option>
                                <option value="Akademik">Akademik</option>
                                <option value="Event">Event</option>
                                <option value="Keuangan">Keuangan</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Status Publikasi <span class="text-red-500">*</span></label>
                            <select id="pengumuman_status" name="status" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all appearance-none cursor-pointer">
                                <option value="Published">Langsung Terbitkan (Published)</option>
                                <option value="Draft">Simpan Saja (Draft)</option>
                                <option value="Archived">Arsipkan (Archived)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-2">Isi Pengumuman <span class="text-red-500">*</span></label>
                        <!-- Simple Rich Text Editor Toolbar -->
                        <div class="border border-slate-200 rounded-t-xl bg-slate-50 p-2 flex gap-2 flex-wrap border-b-0">
                            <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('bold',false,null)" class="w-8 h-8 rounded hover:bg-slate-200 text-slate-600 font-bold">B</button>
                            <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('italic',false,null)" class="w-8 h-8 rounded hover:bg-slate-200 text-slate-600 italic">I</button>
                            <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('underline',false,null)" class="w-8 h-8 rounded hover:bg-slate-200 text-slate-600 underline">U</button>
                            <div class="w-px h-6 bg-slate-300 mx-1 my-auto"></div>
                            <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('insertUnorderedList',false,null)" class="w-8 h-8 rounded hover:bg-slate-200 text-slate-600"><i class="fa-solid fa-list-ul"></i></button>
                            <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('insertOrderedList',false,null)" class="w-8 h-8 rounded hover:bg-slate-200 text-slate-600"><i class="fa-solid fa-list-ol"></i></button>
                        </div>
                        <div id="pengumuman_konten" contenteditable="true" class="w-full min-h-[200px] p-4 bg-white border border-slate-200 rounded-b-xl text-sm outline-none focus:border-blue-500 custom-scrollbar overflow-y-auto"></div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Lampiran (Opsional)</label>
                        <p class="text-xs text-slate-500 mb-2">Format: JPG, PNG, PDF. Maks: 2MB.</p>
                        <input type="file" id="pengumuman_attachment" name="attachment" accept="image/png, image/jpeg, application/pdf" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                        <div id="pengumuman_attachment_preview" class="mt-2 text-xs text-blue-600 hidden"></div>
                    </div>

                    <div class="flex justify-end gap-3 pt-6 border-t border-slate-100">
                        <button type="button" onclick="adminPengumumanCloseModal()" class="px-5 py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition">Batal</button>
                        <button type="submit" id="admin-pengumuman-btn-save" class="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i> Simpan & Publikasi
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
